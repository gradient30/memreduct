name: 缺陷报告
title: "[缺陷]"
description: 报告崩溃或现有功能未按预期工作的问题。
labels: [ "bug" ]
body:
  - type: markdown
    attributes:
      value: 感谢您花时间填写缺陷报告！
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，确认尚未有人提交相同问题。
          required: true
        - label: 我将尽可能详细地描述问题与复现步骤。
          required: true
  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 您使用的 Mem Reduct 版本号。
      placeholder: x.y.z
    validations:
      required: true
  - type: input
    id: windows_version
    attributes:
      label: Windows 版本
      description: 操作系统版本与架构（x64 / ARM64）。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开「…」
        2. 点击「…」
        3. 滚动到「…」
        4. 等等
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 按上述步骤操作后，您期望应用如何表现？
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 应用实际发生了什么？可附上截图。
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 转储
      description: |
        - 如有调试日志，请粘贴于此
        - 如有崩溃转储，请作为附件上传

        提示：点击此区域后可将图片、日志或转储文件拖入。