name: 功能建议
title: "[功能]"
description: 为本项目提出新功能或改进建议。
labels: [ "feature" ]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，确认尚未有人提交相同建议。
          required: true
        - label: 我将尽可能详细地描述需求与使用场景。
          required: true
        - label: 本 Issue 仅包含**一个**功能点，而非多个相关功能打包提交。
          required: true
  - type: input
    id: version
    attributes:
      label: 应用版本
      description: 您当前使用的 Mem Reduct 版本号。
      placeholder: x.y.z
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 简要说明您希望解决的使用场景或痛点。
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议方案
      description: 描述您期望应用如何帮助解决该问题，越具体越好。
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 示意图 / 技术细节
      description: |
        若建议涉及界面变更或扩展，请描述期望的 UI 形态与交互方式。

        提示：点击此区域后可将图片或文件拖入作为附件。
