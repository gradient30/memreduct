name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-x64:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout memreduct
        uses: actions/checkout@v4
        with:
          path: memreduct

      - name: Checkout routine SDK
        uses: actions/checkout@v4
        with:
          repository: henrypp/routine
          path: routine

      - name: Verify version metadata
        working-directory: memreduct
        run: call scripts\verify_version.bat

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        working-directory: memreduct
        run: msbuild memreduct.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      - name: Smoke test
        working-directory: memreduct
        run: call scripts\smoke_test.bat bin\64\memreduct.exe